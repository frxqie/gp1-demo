name: Web App Demo CI/CD

on:
  push:
    branches: [ "master" ]

jobs:
  build-test-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - run: pytest -v

      - run: bandit -r .

  docker-deploy:
    runs-on: ubuntu-latest
    needs: build-test-scan
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/gp1-demo:latest .

      - run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/gp1-demo:latest